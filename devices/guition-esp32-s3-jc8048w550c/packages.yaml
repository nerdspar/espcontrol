# =============================================================================
# PACKAGES - ESPHome include manifest
# =============================================================================
# Load order follows dependencies: device and assets first, then config,
# addons, and screens. Loading screen must be the first page so LVGL shows
# it at startup. Main page (lvgl.yaml) is included after setup screens.
# =============================================================================
#
# 800x480 layout decisions (5" landscape):
#   - Grid: 4 cols x 3 rows = 12 button slots
#   - Buttons are wider than tall, matching landscape feel
#   - Reuses _sm fonts from 4848S040 since cell pixel dims are similar
#     (4848S040 cells: ~155x140; here: ~190x140 with 3 rows + clock bar).
#     Tune fonts in fonts.yaml if labels look small.
#   - clock centered horizontally; cx=400 cy=240 if used as full-screen clock
#
# device_slots.json must be updated in tandem with this file:
#   {
#     "slug": "guition-esp32-s3-jc8048w550c",
#     "slots": 12,
#     "cols": 4,
#     "grid": "3x4",
#     "icon_font": "icon_font_sm",
#     "sensor_font": "statistics_font_sm",
#     "media_title_font": "media_title_font_sm",
#     "volume_number_font": "volume_modal_number_font",
#     "volume_label_font": "label_font_sm",
#     "color_correction": false,
#     "wrap_tall_labels": false
#   }
# Then run: python scripts/generate_device_slots.py
# =============================================================================

substitutions:
  device_slug: "guition-esp32-s3-jc8048w550c"
  firmware_manifest_slug: "guition-esp32-s3-jc8048w550c"
  screen_width: "800"
  screen_height: "480"
  content_width: "760"
  setup_icon_font_id: icon_font_setup_sm
  setup_title_font_id: setup_title_font
  setup_body_font_id: setup_body_font
  setup_pad_row: "20"
  setup_loading_pad_row: "40"
  setup_action_button_width: "200"
  setup_action_button_height: "56"
  setup_action_button_radius: "12"
  icon_font: icon_font_sm
  label_font: label_font_sm
  unit_font: label_font_sm
  sensor_value_font: statistics_font_sm
  padding: 14px
  radius: 8px
  main_page_pad_top: "38"
  main_page_compact_pad_top: "4"
  clock_font_size: "160"
  clock_cx: "400"
  clock_cy: "240"

packages:
  # ---------------------------------------------------------------------------
  # Device, assets, and LVGL base
  # ---------------------------------------------------------------------------
  device:          !include device/device.yaml
  fonts:           !include ../../common/assets/fonts.yaml
  icons:           !include ../../common/assets/icons.yaml
  fonts_device:    !include device/fonts.yaml
  button_theme:    !include ../../common/theme/button.yaml
  # ---------------------------------------------------------------------------
  # Configuration (text/select/number components for web UI)
  # ---------------------------------------------------------------------------
  colors:          !include ../../common/config/colors.yaml
  button_order:    !include ../../common/config/button_order.yaml
  display_config:  !include ../../common/config/display.yaml
  # BEGIN GENERATED BUTTON PACKAGES
  # Generated by scripts/generate_device_slots.py from scripts/device_slots.json.
  # Per-button entity/label/icon (12 slots - 3x4 grid)
  btn_1:           !include { file: ../../common/config/button_template.yaml, vars: { num: "1" } }
  btn_2:           !include { file: ../../common/config/button_template.yaml, vars: { num: "2" } }
  btn_3:           !include { file: ../../common/config/button_template.yaml, vars: { num: "3" } }
  btn_4:           !include { file: ../../common/config/button_template.yaml, vars: { num: "4" } }
  btn_5:           !include { file: ../../common/config/button_template.yaml, vars: { num: "5" } }
  btn_6:           !include { file: ../../common/config/button_template.yaml, vars: { num: "6" } }
  btn_7:           !include { file: ../../common/config/button_template.yaml, vars: { num: "7" } }
  btn_8:           !include { file: ../../common/config/button_template.yaml, vars: { num: "8" } }
  btn_9:           !include { file: ../../common/config/button_template.yaml, vars: { num: "9" } }
  btn_10:          !include { file: ../../common/config/button_template.yaml, vars: { num: "10" } }
  btn_11:          !include { file: ../../common/config/button_template.yaml, vars: { num: "11" } }
  btn_12:          !include { file: ../../common/config/button_template.yaml, vars: { num: "12" } }
  # END GENERATED BUTTON PACKAGES
  # ---------------------------------------------------------------------------
  # Addons
  # ---------------------------------------------------------------------------
  connectivity:    !include ../../common/addon/connectivity.yaml
  improv_serial:   !include ../../common/addon/improv_serial.yaml
  time_sync:       !include ../../common/addon/time.yaml
  backlight:       !include ../../common/addon/backlight.yaml
  bl_schedule:     !include ../../common/addon/backlight_schedule.yaml
  network:         !include ../../common/addon/network.yaml
  fw_update:       !include ../../common/addon/firmware_update.yaml

  # ---------------------------------------------------------------------------
  # Screens (loading must be first page for LVGL startup)
  # ---------------------------------------------------------------------------
  screen_loading:  !include ../../common/device/screen_loading.yaml
  screen_wifi:     !include ../../common/device/screen_wifi_setup.yaml
  screen_ha:       !include ../../common/device/screen_ha_setup.yaml
  screen_ha_act:   !include ../../common/device/screen_ha_actions.yaml
  screen_setup:    !include ../../common/device/screen_button_setup.yaml
  screen_clock:    !include ../../common/device/screen_clock.yaml
  # ---------------------------------------------------------------------------
  # Main page and dynamic sensor subscriptions (after setup screens)
  # ---------------------------------------------------------------------------
  lvgl:            !include device/lvgl.yaml
  sensors:         !include device/sensors.yaml
