# =============================================================================
# FONTS (DEVICE OVERRIDE) - Sized for the 800x480 5" landscape display
# =============================================================================
# Reuses the _sm font family from the 4848S040 reference. Cell pixel
# dimensions are similar enough that these fonts read well on a 4x3 grid.
# Tune sizes here if labels look too small once the panel boots.
# =============================================================================

font:
  # Button icons
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font_sm
    size: 44
    bpp: 4
    glyphs: !include ../../../common/assets/icon_glyphs.yaml

  # Button labels
  - file: "gfonts://Roboto"
    id: label_font_sm
    size: 22
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Sensor value large number
  - file: "gfonts://Roboto@Light"
    id: statistics_font_sm
    size: 44
    bpp: 4
    glyphs:
      - "0123456789.-°/%kWhVA "
      - ":"

  # Media now-playing titles
  - file: "gfonts://Roboto@Light"
    id: media_title_font_sm
    size: 34
    bpp: 4
    glyphs: !include ../../../common/assets/text_glyphs.yaml
    extras:
      - file: "gfonts://Heebo@Light"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Top bar clock and temperature
  - file: "gfonts://Roboto"
    id: clockbar_font_sm
    size: 22
    bpp: 4
    extras:
      - file: "gfonts://Heebo"
        glyphs: !include ../../../common/assets/hebrew_glyphs.yaml

  # Setup screen icons
  - file: 'https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf'
    id: icon_font_setup_sm
    size: 72
    bpp: 4
    glyphs:
      - "\U000F05A9"  # mdi-wifi
      - "\U000F0200"  # mdi-ethernet
      - "\U000F0493"  # mdi-cog
      - "\U000F07D0"  # mdi-home-assistant
