# =============================================================================
# FACTORY BUILD PROFILE - Guition ESP32-S3 JC8048W550C
# =============================================================================
# Same as the standard build but configured for a factory image (the binary
# the web installer flashes to a fresh device). The setup hotspot is enabled
# via captive_portal so the panel can be configured on first boot.
# =============================================================================

substitutions:
  name: "espcontrol-jc8048w550c"
  friendly_name: "Guition JC8048W550C"
  espcontrol_component_url: "file:///config"
  espcontrol_component_ref: "HEAD"

esphome:
  name_add_mac_suffix: true

packages:
  espcontrol: !include ../devices/guition-esp32-s3-jc8048w550c/packages.yaml

wifi:
  ap:
    ssid: "${friendly_name}"

captive_portal:
